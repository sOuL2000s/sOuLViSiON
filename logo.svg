<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  <!-- Outer Eye Shape -->
  <path d="M100 256C100 256 180 136 256 136C332 136 412 256 412 256C412 256 332 376 256 376C180 376 100 256 100 256Z" stroke="url(#grad1)" stroke-width="24" filter="url(#glow)"/>
  <!-- Inner Soul Core -->
  <circle cx="256" cy="256" r="60" fill="url(#grad1)" filter="url(#glow)">
    <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite" />
  </circle>
  <!-- Pupil Detail -->
  <path d="M256 216V236M256 276V296M216 256H236M276 256H296" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
</svg>
